name: frontend
description: Hotel Booking System Frontend
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: ">=3.3.0 <4.0.0"

dependencies:
  flutter:
    sdk: flutter

  cupertino_icons: ^1.0.8
  provider: ^6.1.5
  http: ^1.2.0
  shared_preferences: ^2.2.3
  google_fonts: ^6.1.0
  lottie: ^3.1.0
  pdf: ^3.10.8
  printing: ^5.12.0
  path_provider: ^2.1.2
  fl_chart: ^0.66.0
  uuid: ^4.3.3
  intl: ^0.19.0
  image_picker: ^1.0.7
  audioplayers: ^6.0.0
  flutter_staggered_animations: ^1.1.1
  shimmer: ^3.0.0
  glass_kit: ^4.0.2

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0

flutter:
  uses-material-design: true

  assets:
    - assets/
    - assets/sounds/